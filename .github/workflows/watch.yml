name: Ticket Watcher

on:
  schedule:
    - cron: "*/10 * * * *" # Every 10 minutes
  workflow_dispatch:
    inputs:
      test_notify:
        description: "Send a test Telegram notification instead of checking tickets"
        type: boolean
        default: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        if: ${{ github.event.inputs.test_notify != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright (with system deps)
        if: ${{ github.event.inputs.test_notify != 'true' }}
        run: playwright install chromium --with-deps

      - name: Restore watcher state & auth cache
        uses: actions/cache@v4
        with:
          path: data/
          key: ticket-watcher-data-${{ github.run_id }}
          restore-keys: |
            ticket-watcher-data-

      - name: Run single check
        if: ${{ github.event.inputs.test_notify != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py watch --once

      - name: Send test notification
        if: ${{ github.event.inputs.test_notify == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py test-notify
